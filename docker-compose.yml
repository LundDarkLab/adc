services:
  web:
    build: .
    container_name: lund-web-app
    restart: unless-stopped
    # ❌ RIMUOVI ports (in produzione usa nginx reverse proxy)
    # ❌ RIMUOVI volumes (il codice è copiato nel Dockerfile)
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4.7
    container_name: lund-db-local
    restart: always
    command: 
      - --max_allowed_packet=512M
      - --innodb_buffer_pool_size=1G
      - --log-error=/var/log/mysql/error.log
      # ❌ RIMUOVI general-log in produzione (rallenta)
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    # ❌ RIMUOVI ports (NON esporre MySQL pubblicamente!)
    volumes:
      - lund_db_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "--password=${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lund_db_data: